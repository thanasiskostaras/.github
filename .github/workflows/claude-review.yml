name: Claude PR review

# Reusable senior-review workflow. Call it from any repo with:
#   uses: thanasiskostaras/.github/.github/workflows/claude-review.yml@main
# Billed against the Max subscription (OAuth token), so $0 API spend.
on:
  workflow_call:
    inputs:
      model:
        description: Claude model to review with.
        type: string
        required: false
        default: claude-sonnet-5

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true
          prompt: |
            You are a senior engineer reviewing this pull request. Work FAST and converge —
            your single deliverable is ONE posted PR comment, then you STOP.

            SCOPE — review the DIFF ONLY. Get the changes with:
              git diff origin/${{ github.event.pull_request.base.ref }}...HEAD
            You may open a changed file for local context, but do NOT explore the wider repo,
            do NOT run tests, and do NOT run linters. Base the review on the diff hunks.
            Post your comment as soon as you have enough to say — do not keep digging.

            REVIEW CONTENT (keep it tight):
              - VERDICT line: approve / comment / request-changes.
              - One or two sentence RISK SUMMARY (what could break, blast radius).
              - FINDINGS in severity order (blocker → major → minor → nit), each citing the exact
                `file:line` from the diff with a concrete, actionable fix. Only real issues found
                in the diff — no padding, no praise. Prioritise correctness, security, then
                API/back-compat, test gaps, and repo-convention consistency.
              - If the diff is trivial (docs, formatting, a config bump), say so briefly and approve.

            FINISH: post exactly ONE top-level comment with your review, then stop immediately.
            If you find nothing, still post "✅ Reviewed — no issues found." A run that ends
            without a posted comment is a failure — never stay silent.
          claude_args: "--model ${{ inputs.model }} --max-turns 20"
