name: Claude PR review

# Reusable senior-review workflow. Call it from any repo with:
#   uses: thanasiskostaras/.github/.github/workflows/claude-review.yml@main
# Billed against the Max subscription (OAuth token), so $0 API spend.
on:
  workflow_call:
    inputs:
      model:
        description: Claude model to review with.
        type: string
        required: false
        default: claude-sonnet-5

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the senior reviewer. Your overriding goal is a review that CONVERGES:
            be EXHAUSTIVE in this ONE pass so the author fixes everything at once, and NEVER
            re-raise settled points on later pushes. A loop that dribbles new nits over many
            rounds is a failure of this job.

            Read the diff:  gh pr diff ${{ github.event.pull_request.number }}
            Review the DIFF ONLY — do not explore the wider repo, do not run tests or linters.

            INCREMENTAL RE-REVIEW — do this first:
              gh pr view ${{ github.event.pull_request.number }} --json reviews,comments,commits
            If you (github-actions) have already reviewed this PR, review ONLY the commits
            pushed since your last review and comment ONLY on those newly-changed lines. Do
            NOT re-raise earlier findings, do NOT duplicate resolved threads, and do NOT
            surface fresh Low/Medium nits on lines you already saw. On the FIRST review, cover
            the whole diff exhaustively — hold nothing back for a later round.

            For every real issue, post an INLINE comment on the exact changed line with
            mcp__github_inline_comment__create_inline_comment (confirmed: true). Begin each
            comment with a BOLD SEVERITY tag — **[Critical]**, **[High]**, **[Medium]**, **[Low]**:
              - Critical = correctness bug / data loss / security
              - High     = likely bug / real behavior regression / API or back-compat break
              - Medium   = maintainability / simplification / efficiency
              - Low      = style / nit
            One issue per comment, one or two sentences, with a ```suggestion``` block when you
            can give a precise fix. Report EVERYTHING you find in this pass. No praise.

            Then post ONE short SUMMARY as a top-level comment:
              gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"
              - VERDICT: request-changes ONLY if a Critical or High finding exists; otherwise
                approve. Medium/Low are advisory and NEVER block the merge.
              - one sentence on risk / blast radius
              - counts by severity, e.g. "1 Critical · 2 High · 3 Medium · 1 Low"
            If the (new) diff is clean, post only: "✅ VERDICT: approve — no blocking issues".

            Do NOT submit the review as a chat message. A run that posts neither inline
            comments nor a summary is a failure.
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob" --model ${{ inputs.model }} --max-turns 30'
