name: Claude PR review

# Reusable senior-review workflow. Call it from any repo with:
#   uses: thanasiskostaras/.github/.github/workflows/claude-review.yml@main
# Billed against the Max subscription (OAuth token), so $0 API spend.
on:
  workflow_call:
    inputs:
      model:
        description: Claude model to review with.
        type: string
        required: false
        default: claude-sonnet-5

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior engineer reviewing this pull request. Work FAST and converge —
            your single deliverable is ONE top-level PR comment, then you STOP.

            Read the changes with:  gh pr diff ${{ github.event.pull_request.number }}
            Review the DIFF ONLY — do not explore the wider repo, do not run tests or linters.

            Post your review as exactly ONE top-level comment with:
              gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"
            Then stop immediately. Only the posted gh comment counts — do NOT submit the review
            as a chat message, and do not post more than one comment.

            REVIEW CONTENT (keep it tight):
              - VERDICT line: approve / comment / request-changes.
              - One or two sentence RISK SUMMARY (what could break, blast radius).
              - FINDINGS in severity order (blocker → major → minor → nit), each citing the exact
                `file:line` from the diff with a concrete, actionable fix. Only real issues found
                in the diff — no padding, no praise. Prioritise correctness, security, then
                API/back-compat, test gaps, and repo-convention consistency.
              - If the diff is trivial (docs, formatting, a config bump), say so briefly and approve.
              - If nothing to flag, still post "✅ Reviewed — no issues found."

            A run that ends without a posted comment is a failure — never stay silent.
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment" --model ${{ inputs.model }} --max-turns 20'
