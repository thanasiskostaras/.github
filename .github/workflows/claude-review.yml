name: Claude PR review

# Reusable senior-review workflow. Call it from any repo with:
#   uses: thanasiskostaras/.github/.github/workflows/claude-review.yml@b180f60d535694c745481799f0eea6e9aed7c11e # v1.0.0
# Pin to a release SHA (not @main) — supply-chain hardening; bump via Dependabot.
# Billed against the Max subscription (OAuth token), so $0 API spend.
on:
  workflow_call:
    inputs:
      model:
        description: Claude model to review with.
        type: string
        required: false
        default: claude-sonnet-5

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            EVENT: ${{ github.event.action }}
            BEFORE_SHA: ${{ github.event.before }}
            AFTER_SHA: ${{ github.event.after }}

            You are the senior reviewer. Your overriding goal is a review that CONVERGES:
            be EXHAUSTIVE in one pass so the author fixes everything at once, and NEVER
            re-raise settled points on later pushes. A loop that dribbles new nits over many
            rounds is a failure of this job.

            SCOPE — decide what to review from EVENT (deterministic, not guesswork):
              • FIRST review (EVENT is "opened" or "reopened", OR BEFORE_SHA is empty or all
                zeros): review the WHOLE diff exhaustively —
                  gh pr diff ${{ github.event.pull_request.number }}
                Find and report EVERYTHING now; hold nothing back for a later round.
              • RE-REVIEW (EVENT is "synchronize"): review ONLY the commits just pushed —
                  git diff ${{ github.event.before }} ${{ github.event.after }}
                Comment ONLY on lines in that range. Do NOT re-read the rest of the PR, do NOT
                re-raise earlier findings or resolved threads, and do NOT add fresh Low/Medium
                nits on lines outside the new push. Earlier review points are settled.
            Review the diff ONLY — do not explore the wider repo, do not run tests or linters.

            For every real issue, post an INLINE comment on the exact changed line with
            mcp__github_inline_comment__create_inline_comment (confirmed: true). Begin each
            comment with a BOLD SEVERITY tag — **[Critical]**, **[High]**, **[Medium]**, **[Low]**:
              - Critical = correctness bug / data loss / security
              - High     = likely bug / real behavior regression / API or back-compat break
              - Medium   = maintainability / simplification / efficiency
              - Low      = style / nit
            One issue per comment, one or two sentences, with a ```suggestion``` block when you
            can give a precise fix. Report EVERYTHING in scope this pass. No praise.

            Then post ONE short SUMMARY as a top-level comment:
              gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"
              - VERDICT: request-changes ONLY if a Critical or High finding exists; otherwise
                approve. Medium/Low are advisory and NEVER block the merge.
              - one sentence on risk / blast radius
              - counts by severity, e.g. "1 Critical · 2 High · 3 Medium · 1 Low"
            If the (in-scope) diff is clean, post only: "✅ VERDICT: approve — no blocking issues".

            Do NOT submit the review as a chat message. A run that posts neither inline
            comments nor a summary is a failure.
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob" --model ${{ inputs.model }} --max-turns 30'
