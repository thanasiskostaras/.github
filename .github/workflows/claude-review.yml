name: Claude PR review

# Reusable senior-review workflow. Call it from any repo with:
#   uses: thanasiskostaras/.github/.github/workflows/claude-review.yml@main
# Billed against the Max subscription (OAuth token), so $0 API spend.
on:
  workflow_call:
    inputs:
      model:
        description: Claude model to review with.
        type: string
        required: false
        default: claude-sonnet-5

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR like GitHub Copilot's reviewer: a SMALL summary plus actionable
            INLINE comments with suggested edits. Work fast and converge, then STOP.

            Read the diff:  gh pr diff ${{ github.event.pull_request.number }}
            Review the DIFF ONLY — do not explore the wider repo, do not run tests or linters.

            For each concrete issue, post an INLINE comment on the exact changed line using
            mcp__github_inline_comment__create_inline_comment (with confirmed: true). Keep each
            comment to ONE issue, one or two sentences. When you can propose a precise fix,
            include a GitHub suggestion block so it is one-click appliable:
              ```suggestion
              <the corrected line(s)>
              ```
            Only real issues in the diff — no nitpicking for its own sake, no praise.
            Prioritise correctness, security, API/back-compat, test gaps, repo conventions.

            Then post ONE short SUMMARY as a top-level comment with:
              gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"
            Keep the summary SMALL:
              - VERDICT: approve / comment / request-changes
              - one sentence on risk / blast radius
              - a count of the inline comments by severity (e.g. "2 major · 1 minor inline")
            If the diff is trivial or clean, post only the summary: "✅ VERDICT: approve — no issues".

            Do NOT submit the review as a chat message. A run that posts neither inline
            comments nor a summary is a failure.
          claude_args: '--allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment" --model ${{ inputs.model }} --max-turns 25'
